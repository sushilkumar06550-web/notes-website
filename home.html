<!DOCTYPE html>
<html>
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #87CEEB, #0b1f3a);
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .card {
      background: white;
      color: #0b1f3a;
      width: 150px;
      margin: 10px;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }

    .card:hover {
      background: #e6f7ff;
    }

  </style>
</head>

<body>

  <h1>📘 Class 10 Notes</h1>
  <p>All Subjects Available</p>

  <div class="container">

    <a class="card" href="#">Science</a>
    <a class="card" href="#">Maths</a>
    <a class="card" href="#">English</a>
    <a class="card" href="#">Social Science</a>
    <a class="card" href="#">Hindi</a>

  </div>

</body>
</html>
